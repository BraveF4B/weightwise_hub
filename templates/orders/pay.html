{% extends 'base.html' %}

{% block title %}Pay — WeightWise Hub{% endblock %}

{% block content %}
<section class="py-5" style="background: var(--black); min-height: 80vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="order-summary-box text-center">
                    <div class="paystack-icon mb-3">
                        <i class="fas fa-lock fa-2x text-orange"></i>
                    </div>
                    <h4 class="text-white fw-bold">Complete Your Payment</h4>
                    <p class="text-muted mb-1 mt-2">Order for <strong class="text-white">{{ order.full_name }}</strong></p>
                    <p class="text-muted mb-4">{{ order.email }}</p>
                    <div class="product-price fs-2 mb-4">₦{{ order.total_price|floatformat:0 }}</div>
                    <button
                        onclick="payWithPaystack()"
                        class="btn-primary-custom w-100 d-block text-center">
                        <i class="fas fa-credit-card me-2"></i> Pay Now with Paystack
                    </button>
                    <p class="text-muted small mt-3">
                        <i class="fas fa-shield-alt me-1"></i> 256-bit SSL secured payment
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
function payWithPaystack() {
    var handler = PaystackPop.setup({
        key: '{{ paystack_public_key }}',
        email: '{{ order.email }}',
        amount: {{ total_kobo }},
        currency: 'NGN',
        ref: 'WWH-' + Math.floor(Math.random() * 1000000000 + 1),
        callback: function(response) {
            window.location.href = '/orders/verify/' + response.reference + '/';
        },
        onClose: function() {
            alert('Payment cancelled. Your order has been saved. You can complete payment later.');
        }
    });
    handler.openIframe();
}
</script>
{% endblock %}
