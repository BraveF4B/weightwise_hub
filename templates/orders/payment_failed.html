{% extends 'base.html' %}

{% block title %}Payment Failed — WeightWise Hub{% endblock %}

{% block content %}
<section class="py-5" style="background: var(--black); min-height: 80vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 text-center">
                <div style="font-size: 5rem; color: var(--red);">
                    <i class="fas fa-times-circle"></i>
                </div>
                <h2 class="section-title mt-3">PAYMENT <span>FAILED</span></h2>
                <p class="text-muted mt-2 mb-4">
                    Something went wrong with your payment for Order <strong class="text-orange">#{{ order.id }}</strong>.
                    Your order is saved — please try again.
                </p>
                <a href="{% url 'checkout' %}" class="btn-primary-custom me-2">Try Again</a>
                <a href="{% url 'shop' %}" class="btn-outline-custom">Back to Shop</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
